name: Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
      language:
        required: true
        type: string
      scan_docker_image:
        required: false
        type: string
        default: ""
      java_version:
        required: false
        type: string
        default: "17"
      node_version:
        required: false
        type: string
        default: "20"
    outputs:
      security_passed:
        description: "Whether all security gates passed"
        value: ${{ jobs.security-gate.outputs.passed }}

jobs:
  sast:
    name: SAST - SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check SONAR_TOKEN
        id: check-sonar
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN not configured -- SKIP SAST"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Setup Java
        if: steps.check-sonar.outputs.available == 'true' && inputs.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Setup Node
        if: steps.check-sonar.outputs.available == 'true' && inputs.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Run SonarQube Scan
        if: steps.check-sonar.outputs.available == 'true'
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.project_name }}
            -Dsonar.projectName=${{ inputs.project_name }}

      - name: SAST Summary
        run: |
          if [ "${{ steps.check-sonar.outputs.available }}" == "true" ]; then
            echo "SAST: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SAST: SKIP (SONAR_TOKEN not configured)" >> "$GITHUB_STEP_SUMMARY"
          fi

  sca:
    name: SCA - Dependency Analysis
    runs-on: ubuntu-latest
    outputs:
      critical_found: ${{ steps.evaluate.outputs.critical_found }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check Black Duck
        id: check-blackduck
        run: |
          if [ -z "$BLACKDUCK_URL" ] || [ -z "$BLACKDUCK_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Black Duck not configured -- falling back to OWASP Dependency-Check"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          BLACKDUCK_URL: ${{ secrets.BLACKDUCK_URL }}
          BLACKDUCK_TOKEN: ${{ secrets.BLACKDUCK_TOKEN }}

      - name: Run Black Duck Scan
        if: steps.check-blackduck.outputs.available == 'true'
        uses: synopsys-sig/detect-action@v0.3.5
        with:
          scan-mode: RAPID
          blackduck-url: ${{ secrets.BLACKDUCK_URL }}
          blackduck-api-token: ${{ secrets.BLACKDUCK_TOKEN }}

      - name: Setup Java for OWASP DC
        if: steps.check-blackduck.outputs.available == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - name: Run OWASP Dependency-Check
        if: steps.check-blackduck.outputs.available == 'false'
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: ${{ inputs.project_name }}
          path: .
          format: HTML
          args: --failOnCVSS 9

      - name: Upload OWASP DC Report
        if: steps.check-blackduck.outputs.available == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dc-report
          path: reports/

      - name: Evaluate SCA Results
        id: evaluate
        run: |
          if [ -f "reports/dependency-check-report.html" ]; then
            if grep -qi "critical" reports/dependency-check-report.html 2>/dev/null; then
              echo "critical_found=true" >> "$GITHUB_OUTPUT"
            else
              echo "critical_found=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "critical_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Jira Ticket on Critical SCA Failure
        if: steps.evaluate.outputs.critical_found == 'true'
        run: |
          if [ -z "$JIRA_URL" ] || [ -z "$JIRA_TOKEN" ]; then
            echo "Jira not configured -- SKIP ticket creation"
            exit 0
          fi
          curl -s -X POST \
            -H "Authorization: Bearer $JIRA_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "fields": {
                "project": {"key": "SEC"},
                "summary": "CRITICAL SCA vulnerability in ${{ inputs.project_name }}",
                "description": "Critical vulnerabilities detected during SCA scan of ${{ inputs.project_name }}. Review dependency-check report for details.",
                "issuetype": {"name": "Bug"},
                "priority": {"name": "Critical"}
              }
            }' \
            "$JIRA_URL/rest/api/2/issue"
          echo "Jira ticket created for critical SCA finding"
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

  secrets:
    name: Secrets Detection - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Secrets Scan Summary
        if: always()
        run: echo "Secrets Detection: PASS" >> "$GITHUB_STEP_SUMMARY"

  container:
    name: Container Scan - Trivy
    runs-on: ubuntu-latest
    if: inputs.scan_docker_image != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.scan_docker_image }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Container Scan Summary
        if: always()
        run: echo "Container Scan: completed for ${{ inputs.scan_docker_image }}" >> "$GITHUB_STEP_SUMMARY"

  sbom:
    name: SBOM Generation - Syft
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-${{ inputs.project_name }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.project_name }}
          path: sbom-${{ inputs.project_name }}.spdx.json

      - name: SBOM Summary
        run: echo "SBOM: generated for ${{ inputs.project_name }}" >> "$GITHUB_STEP_SUMMARY"

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, container, sbom]
    if: always()
    outputs:
      passed: ${{ steps.gate.outputs.passed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Evaluate Security Gate
        id: gate
        run: |
          PASSED=true
          SAST_STATUS="${{ needs.sast.result }}"
          SCA_STATUS="${{ needs.sca.result }}"
          SECRETS_STATUS="${{ needs.secrets.result }}"
          CONTAINER_STATUS="${{ needs.container.result }}"
          SBOM_STATUS="${{ needs.sbom.result }}"

          if [ "$SAST_STATUS" == "failure" ]; then PASSED=false; fi
          if [ "$SCA_STATUS" == "failure" ]; then PASSED=false; fi
          if [ "$SECRETS_STATUS" == "failure" ]; then PASSED=false; fi
          if [ "$CONTAINER_STATUS" == "failure" ]; then PASSED=false; fi
          if [ "$SBOM_STATUS" == "failure" ]; then PASSED=false; fi

          STATUS_SAST="PASS"
          STATUS_SCA="PASS"
          STATUS_SECRETS="PASS"
          STATUS_CONTAINER="PASS"
          STATUS_SBOM="PASS"

          [ "$SAST_STATUS" == "failure" ] && STATUS_SAST="FAIL"
          [ "$SAST_STATUS" == "skipped" ] && STATUS_SAST="SKIP"
          [ "$SCA_STATUS" == "failure" ] && STATUS_SCA="FAIL"
          [ "$SCA_STATUS" == "skipped" ] && STATUS_SCA="SKIP"
          [ "$SECRETS_STATUS" == "failure" ] && STATUS_SECRETS="FAIL"
          [ "$CONTAINER_STATUS" == "failure" ] && STATUS_CONTAINER="FAIL"
          [ "$CONTAINER_STATUS" == "skipped" ] && STATUS_CONTAINER="SKIP"
          [ "$SBOM_STATUS" == "failure" ] && STATUS_SBOM="FAIL"

          {
            echo "## Security Gate Results"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| SAST (SonarQube) | ${STATUS_SAST} |"
            echo "| SCA (Dependency Analysis) | ${STATUS_SCA} |"
            echo "| Secrets Detection (Gitleaks) | ${STATUS_SECRETS} |"
            echo "| Container Scan (Trivy) | ${STATUS_CONTAINER} |"
            echo "| SBOM (Syft) | ${STATUS_SBOM} |"
            echo ""
            if [ "$PASSED" == "true" ]; then
              echo "**Overall: PASS**"
            else
              echo "**Overall: FAIL**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

      - name: Fail if gate not passed
        if: steps.gate.outputs.passed == 'false'
        run: |
          echo "Security gate FAIL -- one or more checks did not pass"
          exit 1

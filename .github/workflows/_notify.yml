name: Notify (Reusable)

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      status:
        required: true
        type: string
      app_name:
        required: false
        type: string
        default: ""
      environment:
        required: false
        type: string
        default: ""
      version:
        required: false
        type: string
        default: ""

jobs:
  email:
    name: Email Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check SMTP configuration
        id: check-smtp
        run: |
          if [ -z "$SMTP_SERVER" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "SMTP_SERVER not configured -- SKIP email notification"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}

      - name: Send email notification
        if: steps.check-smtp.outputs.available == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[${{ inputs.status }}] ${{ inputs.job_name }} - ${{ inputs.app_name }} ${{ inputs.version }}"
          body: |
            ForgeOps Notification

            Job: ${{ inputs.job_name }}
            Status: ${{ inputs.status }}
            Application: ${{ inputs.app_name }}
            Version: ${{ inputs.version }}
            Environment: ${{ inputs.environment }}
            Repository: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ vars.NOTIFICATION_EMAIL || 'devops@forgeops.local' }}
          from: ForgeOps CI <noreply@forgeops.local>

  teams:
    name: Teams Notification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check Teams webhook
        id: check-teams
        run: |
          if [ -z "$TEAMS_WEBHOOK" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "TEAMS_WEBHOOK not configured -- SKIP Teams notification"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}

      - name: Send Teams adaptive card
        if: steps.check-teams.outputs.available == 'true'
        run: |
          if [ "${{ inputs.status }}" == "success" ]; then
            COLOR="good"
            STATUS_TEXT="PASS"
          elif [ "${{ inputs.status }}" == "failure" ]; then
            COLOR="attention"
            STATUS_TEXT="FAIL"
          else
            COLOR="default"
            STATUS_TEXT="${{ inputs.status }}"
          fi

          CARD=$(cat <<ENDCARD
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": "ForgeOps - ${{ inputs.job_name }}",
                      "weight": "bolder",
                      "size": "large"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        {"title": "Status", "value": "${STATUS_TEXT}"},
                        {"title": "Application", "value": "${{ inputs.app_name }}"},
                        {"title": "Version", "value": "${{ inputs.version }}"},
                        {"title": "Environment", "value": "${{ inputs.environment }}"},
                        {"title": "Repository", "value": "${{ github.repository }}"}
                      ]
                    },
                    {
                      "type": "ActionSet",
                      "actions": [
                        {
                          "type": "Action.OpenUrl",
                          "title": "View Run",
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              }
            ]
          }
          ENDCARD
          )

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "${CARD}" \
            "$TEAMS_WEBHOOK"
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}

  splunk:
    name: Splunk Logging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x scripts/*.sh scripts/*.py 2>/dev/null || true

      - name: Check Splunk configuration
        id: check-splunk
        run: |
          if [ -z "$SPLUNK_HEC_URL" ] || [ -z "$SPLUNK_HEC_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Splunk not configured -- SKIP Splunk logging"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

      - name: Log to Splunk
        if: steps.check-splunk.outputs.available == 'true'
        run: |
          if [ -f scripts/forgeops-log.sh ]; then
            bash scripts/forgeops-log.sh \
              --event "notification" \
              --job "${{ inputs.job_name }}" \
              --status "${{ inputs.status }}" \
              --app "${{ inputs.app_name }}" \
              --version "${{ inputs.version }}" \
              --environment "${{ inputs.environment }}"
          else
            curl -s -k \
              -H "Authorization: Splunk $SPLUNK_HEC_TOKEN" \
              -d "{\"event\":\"notification\",\"sourcetype\":\"forgeops\",\"fields\":{\"job\":\"${{ inputs.job_name }}\",\"status\":\"${{ inputs.status }}\",\"app\":\"${{ inputs.app_name }}\",\"version\":\"${{ inputs.version }}\",\"environment\":\"${{ inputs.environment }}\"}}" \
              "$SPLUNK_HEC_URL/services/collector/event"
          fi
        env:
          SPLUNK_HEC_URL: ${{ secrets.SPLUNK_HEC_URL }}
          SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}
